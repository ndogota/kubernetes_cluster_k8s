apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back
  template:
    metadata:
      labels:
        app: back
    spec:
      containers:
        - name: back
          image: private-registry:5000/back-image:latest
          ports:
            - containerPort: 3070
      imagePullSecrets:
      - name: my-registry-secret